spring.application.name=camping-manager

# === Database (PostgreSQL) ===
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:camping_manager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# === JWT ===
app.jwt.secret=${JWT_SECRET:cambia-questa-chiave-segreta-con-almeno-32-caratteri-in-produzione}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# === Upload immagini profilo (storage locale) ===
app.upload.dir=${UPLOAD_DIR:uploads}

# === URL base applicazione (per le redirect Stripe) ===
app.base-url=${APP_BASE_URL:http://localhost:8080}

# === Stripe (pagamento noleggio bici) ===
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# === Admin iniziale (seed) ===
app.admin.email=${ADMIN_EMAIL:admin@camping.it}
app.admin.password=${ADMIN_PASSWORD:Admin123!}

# === Server ===
server.port=${SERVER_PORT:8080}
